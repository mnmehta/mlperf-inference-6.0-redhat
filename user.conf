# MLPerf LoadGen User Configuration
# Format: model.scenario.key = value
# Model can be '*' as wildcard to apply to all models
# All times are in milliseconds

# Offline scenario configuration
*.Offline.min_duration = 600000
*.Offline.min_queries = 1

# Server scenario configuration
*.Server.target_qps = 0.5
*.Server.min_duration = 120000
*.Server.min_queries = 1
