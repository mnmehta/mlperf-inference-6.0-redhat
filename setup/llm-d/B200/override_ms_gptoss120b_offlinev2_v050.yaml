decode:
  containers:
  - args:
    - --disable-uvicorn-access-log
    - --gpu-memory-utilization=0.95
    - --no-enable-prefix-caching
    - --max-num-batched-tokens
    - '8192'
    - --max-num-seqs
    - '320'
    - --compilation-config
    - '{"max_cudagraph_capture_size": 2048}'
    - --async-scheduling
    image: ghcr.io/llm-d/llm-d-cuda:v0.5.0
    livenessProbe:
      failureThreshold: 3
      httpGet:
        path: /health
        port: vllm
      periodSeconds: 10
      timeoutSeconds: 5
    modelCommand: vllmServe
    mountModelVolume: true
    name: vllm
    ports:
    - containerPort: 8000
      name: vllm
      protocol: TCP
    readinessProbe:
      failureThreshold: 3
      httpGet:
        path: /v1/models
        port: vllm
      periodSeconds: 5
      timeoutSeconds: 2
    resources:
      limits:
        cpu: '16'
        memory: 100Gi
      requests:
        cpu: '16'
        memory: 100Gi
    startupProbe:
      failureThreshold: 60
      httpGet:
        path: /v1/models
        port: vllm
      initialDelaySeconds: 15
      periodSeconds: 30
      timeoutSeconds: 5
    volumeMounts:
    - mountPath: /.config
      name: metrics-volume
    - mountPath: /dev/shm
      name: shm
    - mountPath: /.cache
      name: torch-compile-cache
    - mountPath: /usr/local/cuda/compat
      name: hide-cuda-compat
  volumes:
  - emptyDir: {}
    name: metrics-volume
  - emptyDir: {}
    name: torch-compile-cache
  - emptyDir:
      medium: Memory
      sizeLimit: 20Gi
    name: shm
  - emptyDir: {}
    name: hide-cuda-compat
